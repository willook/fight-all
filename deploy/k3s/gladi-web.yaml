apiVersion: v1
kind: Namespace
metadata:
  name: gladi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gladi-nginx
  namespace: gladi
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gladi-web
  namespace: gladi
  labels:
    app: gladi-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gladi-web
  template:
    metadata:
      labels:
        app: gladi-web
    spec:
      initContainers:
        - name: copy-dist
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp -R /source/. /html/
              find /html -type d -exec chmod 755 {} +
              find /html -type f -exec chmod 644 {} +
          volumeMounts:
            - name: source-dist
              mountPath: /source
              readOnly: true
            - name: web-root
              mountPath: /html
      containers:
        - name: web
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-root
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: source-dist
          hostPath:
            path: /home/willook/workspace/fight-all/dist
            type: Directory
        - name: web-root
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: gladi-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: gladi-web
  namespace: gladi
spec:
  type: LoadBalancer
  selector:
    app: gladi-web
  ports:
    - name: http
      port: 5173
      targetPort: 80
